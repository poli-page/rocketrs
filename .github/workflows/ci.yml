name: CI
on:
  push:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: ['stable', 'beta', '1.75']
    steps:
      - uses: actions/checkout@v4
        with:
          path: rocketrs
      - uses: actions/checkout@v4
        with:
          repository: poli-page/sdk-rust
          path: sdk-rust
          ref: main
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rocketrs
      - name: Format
        working-directory: rocketrs
        run: cargo fmt --check
        if: hashFiles('rocketrs/Cargo.toml') != ''
      - name: Clippy
        working-directory: rocketrs
        run: cargo clippy --all-targets -- -D warnings
        if: hashFiles('rocketrs/Cargo.toml') != ''
      - name: Test
        working-directory: rocketrs
        run: cargo test
        if: hashFiles('rocketrs/Cargo.toml') != ''
      - name: Doc
        working-directory: rocketrs
        run: cargo doc --no-deps
        if: hashFiles('rocketrs/Cargo.toml') != ''

  integration:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          path: rocketrs
      - uses: actions/checkout@v4
        with:
          repository: poli-page/sdk-rust
          path: sdk-rust
          ref: main
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - name: Integration test against develop API
        working-directory: rocketrs
        env:
          POLI_PAGE_API_KEY: ${{ secrets.POLI_PAGE_DEVELOP_API_KEY }}
        run: cargo test -- --ignored
